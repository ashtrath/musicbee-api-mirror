name: Mirror API

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  check-and-mirror:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Run ApiChecker
        id: check
        run: |
          LAST_HASH=""
          if [ -f last-hash.txt ]; then LAST_HASH=$(cat last-hash.txt); fi

          OUTPUT=$(dotnet run --project src/ApiChecker)
          NEW_HASH=$(echo "$OUTPUT" | grep '^HASH=' | cut -d'=' -f2)
          echo "$NEW_HASH" > last-hash.txt

          if [ "$NEW_HASH" != "$LAST_HASH" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and Release Changes
        if: steps.check.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        run: |
          
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add last-hash.txt MusicBeeInterface.cs MusicBeeInterface.vb
          git commit -m "chore: Update MusicBee API files to latest version"
          
          TAG="v$(date +'%Y.%m.%d')-${{ github.run_number }}"
          git tag "$TAG"
          
          git push origin HEAD:main
          git push origin "$TAG"
          
          gh release create "$TAG" MusicBeeInterface.cs MusicBeeInterface.vb \
            -t "MusicBee API $TAG" \
            -n "Automated MusicBee API mirror update."
          
          if [ -n "$WEBHOOK_URL" ]; then
            curl -X POST -H "Content-Type: application/json" -d "{\"tag\":\"$TAG\"}" "$WEBHOOK_URL"
          fi
